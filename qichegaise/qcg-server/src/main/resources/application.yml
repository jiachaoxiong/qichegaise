server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/qcg?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      fail-on-empty-beans: false
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-256-bit-key}
  expiration: 604800000

wechat:
  app-id: ${WECHAT_APP_ID:your-wechat-appid}
  app-secret: ${WECHAT_APP_SECRET:your-wechat-secret}

oss:
  endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:your-oss-key}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:your-oss-secret}
  bucket-name: ${OSS_BUCKET:qcg-photos}

ai:
  endpoint: ${AI_ENDPOINT:vision.aliyuncs.com}
  timeout: 30000
